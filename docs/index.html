<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vintage Camera Log</title>
<style>
  body { margin:0; background:#151210; color:#ece9e4; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.2rem; color:#B0763C; margin-bottom:0.4em; }
  p { font-size:1.05rem; line-height:1.6; color:#c8c5c0; }
  .badge { display:inline-block; margin-top:1.5em; padding:10px 22px; border:1px solid #B0763C; border-radius:24px; color:#B0763C; text-decoration:none; }
  footer { margin-top:3em; font-size:0.85rem; color:#7a766f; }
  a { color:#B0763C; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #B0763C55 0%, #B0763C00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Vintage Camera Log</h1>
  <p>Track a vintage film camera collection with film-load history.</p>
  <p>Free tier: Log cameras with model and condition. Upgrade to Pro for Film-roll log per camera with development notes.</p>
  <a class="badge" href="privacy.html">Privacy</a>
  <a class="badge" href="terms.html">Terms</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
