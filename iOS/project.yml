name: VintageCameraLog
options:
  bundleIdPrefix: com.shimondeitel.vintagecameralog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  VintageCameraLog:
    type: application
    platform: iOS
    sources:
      - path: VintageCameraLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagecameralog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: VintageCameraLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VintageCameraLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VintageCameraLogTests
      - path: VintageCameraLog.storekit
    dependencies:
      - target: VintageCameraLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagecameralog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VintageCameraLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VintageCameraLogUITests
    dependencies:
      - target: VintageCameraLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagecameralog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  VintageCameraLog:
    build:
      targets:
        VintageCameraLog: all
        VintageCameraLogTests: [test]
        VintageCameraLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: VintageCameraLog.storekit
    test:
      config: Debug
      storeKitConfiguration: VintageCameraLog.storekit
      targets:
        - VintageCameraLogTests
        - VintageCameraLogUITests
    archive:
      config: Release
